<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oshi.tw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #333;
      background: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    main {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    ul {
      list-style: none;
      margin-top: 1rem;
    }
    li { margin: 0.5rem 0; }
    a {
      color: #555;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    a:hover {
      color: #000;
      border-color: #000;
    }
    .arrow { color: #aaa; margin: 0 0.25rem; }
  </style>
</head>
<body>
  <main>
    <h1>oshi.tw</h1>
    <ul>
      <li>
        <a href="/mizuki">/mizuki</a>
        <span class="arrow">→</span>
        <a href="https://prism.mizuki.tw">prism.mizuki.tw</a>
      </li>
    </ul>
  </main>
</body>
</html>
